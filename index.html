<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather App</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- Search -->
  <div class="search-box">
    <input type="text" id="cityInput" placeholder="Search city...">
    <button onclick="getWeather()">🔍</button>
    <button onclick="getLocation()">📍</button>
  </div>

  <!-- Weather Main -->
  <div class="weather-box">
    <h2 id="city">City</h2>
    <img id="icon" src="" />
    <p id="desc">---</p>
  </div>
  <div class="temp-box">
  <span id="temp">--</span>
  <span class="degree">°C</span>
</div>
<div class="hourly">

  <div class="hour-card">
    <p>12:00</p>
    <img src="https://cdn-icons-png.flaticon.com/512/869/869869.png">
    <p>28°C</p>
  </div>

  <div class="hour-card">
    <p>03:00</p>
    <img src="https://cdn-icons-png.flaticon.com/512/414/414825.png">
    <p>25°C</p>
  </div>

  <div class="hour-card">
    <p>06:00</p>
    <img src="https://cdn-icons-png.flaticon.com/512/1163/1163657.png">
    <p>22°C</p>
  </div>

</div>

  <!-- Info -->
  <div class="info">
    <div>Humidity: <span id="humidity"></span></div>
    <div>Wind: <span id="wind"></span></div>
    <div>Feels: <span id="feels"></span></div>
  </div>

  <!-- Forecast -->
   <div class="hourly" id="hourly"></div>
  <div class="forecast" id="forecast"></div>

</div>

<script src="script.js"></script>
<input type="text" id="cityInput">
<div id="forecast"></div>
<img id="icon">
</body>
</html>
