<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherX Pro</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

<div class="overlay"></div>

<div class="container">

<header>

<div class="search-box">

<input
type="text"
id="cityInput"
placeholder="Search city...">

<button id="searchBtn">
<i class="fas fa-search"></i>
</button>

<button id="locationBtn">
<i class="fas fa-location-crosshairs"></i>
</button>

</div>

</header>

<section class="main-card">

<div class="top">

<div>

<h2 id="city">City</h2>

<p id="date">Loading...</p>

</div>

<div class="clock" id="clock">

--:--

</div>

</div>

<div class="weather-icon">

<img id="weatherIcon" src="" alt="weather">

</div>

<h1 id="temperature">

--°C

</h1>

<p id="description">

Loading...

</p>

<div class="high-low">

<span id="maxTemp">

H: --

</span>

<span id="minTemp">

L: --

</span>

</div>

</section>

<section class="details">

<div class="box">

<i class="fas fa-temperature-half"></i>

<h4>Feels Like</h4>

<p id="feelsLike">--°</p>

</div>

<div class="box">

<i class="fas fa-droplet"></i>

<h4>Humidity</h4>

<p id="humidity">--%</p>

</div>

<div class="box">

<i class="fas fa-wind"></i>

<h4>Wind</h4>

<p id="wind">-- km/h</p>

</div>

<div class="box">

<i class="fas fa-gauge-high"></i>

<h4>Pressure</h4>

<p id="pressure">----</p>

</div>

<div class="box">

<i class="fas fa-eye"></i>

<h4>Visibility</h4>

<p id="visibility">-- km</p>

</div>

<div class="box">

<i class="fas fa-sun"></i>

<h4>UV Index</h4>

<p id="uv">--</p>

</div>

</section>

<section>

<h2 class="title">

Today's Forecast

</h2>

<div id="hourlyForecast" class="hourly">

</div>

</section>

<section>

<h2 class="title">

7-Day Forecast

</h2>

<div id="weeklyForecast" class="weekly">

</div>

</section>

<footer>

Made with ❤️ by Aisha

</footer>

</div>

<script src="script.js"></script>

</body>
</html>
